<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pepe Grillo 🦗</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
#app{width:100%;max-width:480px;background:white;border-radius:16px;border:1px solid #e0deff;overflow:hidden;display:flex;flex-direction:column;height:90vh;max-height:700px;box-shadow:0 4px 24px rgba(83,74,183,0.08)}
#header{padding:14px 18px;border-bottom:1px solid #f0eeff;display:flex;align-items:center;gap:10px}
#avatar{width:40px;height:40px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
#header-name{font-size:15px;font-weight:600;color:#1a1a2e}
#header-sub{font-size:11px;color:#888}
#status{font-size:11px;padding:3px 10px;border-radius:20px;background:#E1F5EE;color:#0F6E56;font-weight:500;margin-left:auto}
#tabs{display:flex;border-bottom:1px solid #f0eeff}
.tab{flex:1;padding:10px 6px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;color:#888;border-bottom:2px solid transparent}
.tab.active{color:#534AB7;border-bottom-color:#534AB7}
#panels{flex:1;overflow:hidden;display:flex;flex-direction:column}
.panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.panel.active{display:flex}
#messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.assistant{align-self:flex-start}
.bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6;white-space:pre-wrap}
.user .bubble{background:#534AB7;color:white;border-bottom-right-radius:4px}
.assistant .bubble{background:#f5f4ff;color:#1a1a2e;border-bottom-left-radius:4px;border:1px solid #e0deff}
.msg-avatar{width:28px;height:28px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.typing{display:flex;gap:4px;align-items:center;padding:10px 14px}
.dot{width:7px;height:7px;border-radius:50%;background:#AFA9EC;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
#chips{display:flex;gap:6px;flex-wrap:wrap;padding:8px 14px;border-top:1px solid #f0eeff}
.chip{padding:5px 12px;border-radius:20px;border:1px solid #AFA9EC;font-size:11px;color:#534AB7;cursor:pointer;background:#EEEDFE;white-space:nowrap}
.chip:hover{background:#CECBF6}
#input-area{padding:10px 14px;border-top:1px solid #f0eeff;display:flex;gap:8px}
#msg-input{flex:1;padding:9px 14px;border:1px solid #e0deff;border-radius:20px;font-size:13px;font-family:inherit;background:#f5f4ff;color:#1a1a2e;resize:none;outline:none}
#msg-input:focus{border-color:#7F77DD}
#send-btn{width:38px;height:38px;border-radius:50%;background:#534AB7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end}
#send-btn:hover{background:#3C3489}
#send-btn svg{width:15px;height:15px;fill:white}
#send-btn:disabled{background:#e0deff;cursor:not-allowed}
#task-input-area{padding:12px 14px;border-bottom:1px solid #f0eeff;display:flex;gap:8px}
#task-input{flex:1;padding:8px 12px;border:1px solid #e0deff;border-radius:8px;font-size:13px;font-family:inherit;background:#f5f4ff;color:#1a1a2e;outline:none}
#add-task-btn{padding:8px 14px;background:#534AB7;color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer}
#task-filters{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid #f0eeff;flex-wrap:wrap}
.filter-btn{padding:4px 12px;border-radius:20px;border:1px solid #e0deff;font-size:12px;cursor:pointer;background:white;color:#888}
.filter-btn.active{background:#EEEDFE;color:#534AB7;border-color:#AFA9EC}
#tasks-list{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#f5f4ff;border-radius:8px;border:1px solid #e0deff}
.task-check{width:18px;height:18px;border-radius:50%;border:1.5px solid #AFA9EC;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
.task-check.done{background:#534AB7;border-color:#534AB7;color:white;font-size:11px}
.task-text{flex:1;font-size:13px;color:#1a1a2e;line-height:1.4}
.task-text.done{text-decoration:line-through;color:#aaa}
.task-cat{font-size:10px;padding:2px 8px;border-radius:20px;margin-top:3px;display:inline-block}
.cat-marketing{background:#EEEDFE;color:#534AB7}
.cat-datos{background:#E1F5EE;color:#0F6E56}
.cat-productividad{background:#FAEEDA;color:#854F0B}
.cat-otro{background:#f0f0f0;color:#666}
.task-del{color:#ccc;cursor:pointer;font-size:18px;line-height:1}
.task-del:hover{color:#A32D2D}
#empty-tasks{text-align:center;color:#aaa;font-size:13px;padding:2rem;line-height:2}
#analysis-input-area{padding:12px 14px;border-bottom:1px solid #f0eeff;display:flex;flex-direction:column;gap:8px}
#analysis-type{display:flex;gap:6px;flex-wrap:wrap}
.atype-btn{padding:4px 12px;border-radius:20px;border:1px solid #e0deff;font-size:12px;cursor:pointer;background:white;color:#888}
.atype-btn.active{background:#EEEDFE;color:#534AB7;border-color:#AFA9EC}
#analysis-text{width:100%;padding:8px 12px;border:1px solid #e0deff;border-radius:8px;font-size:13px;font-family:inherit;background:#f5f4ff;color:#1a1a2e;resize:none;outline:none;height:80px}
#analyze-btn{padding:8px 16px;background:#534AB7;color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;align-self:flex-end}
#analyze-btn:disabled{background:#e0deff;color:#aaa;cursor:not-allowed}
#analysis-result{flex:1;overflow-y:auto;padding:14px;font-size:13px;line-height:1.7;color:#1a1a2e;white-space:pre-wrap}
#analysis-placeholder{color:#aaa;text-align:center;padding:2rem;font-size:13px;line-height:1.8}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="avatar">🦗</div>
    <div>
      <div id="header-name">Pepe Grillo</div>
      <div id="header-sub">marketing · estrategia · datos · productividad</div>
    </div>
    <div id="status">● activo</div>
  </div>
  <div id="tabs">
    <div class="tab active" onclick="switchTab('chat')">💬 Chat</div>
    <div class="tab" onclick="switchTab('tasks')">✅ Tareas</div>
    <div class="tab" onclick="switchTab('analysis')">📊 Análisis</div>
  </div>
  <div id="panels">
    <div class="panel active" id="panel-chat">
      <div id="messages"></div>
      <div id="chips">
        <span class="chip" onclick="sendChip('Dame 5 ideas de contenido para esta semana')">Ideas de contenido</span>
        <span class="chip" onclick="sendChip('Revisá mi estrategia de marketing')">Revisar estrategia</span>
        <span class="chip" onclick="sendChip('¿Cuáles son las métricas clave que debería trackear?')">Métricas clave</span>
        <span class="chip" onclick="sendChip('Ayudame a priorizar mis tareas de hoy')">Priorizar tareas</span>
      </div>
      <div id="input-area">
        <textarea id="msg-input" rows="1" placeholder="Escribile a Pepe Grillo..."></textarea>
        <button id="send-btn">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
    <div class="panel" id="panel-tasks">
      <div id="task-input-area">
        <input id="task-input" type="text" placeholder="Nueva tarea..."/>
        <button id="add-task-btn" onclick="addTask()">+ Agregar</button>
      </div>
      <div id="task-filters">
        <button class="filter-btn active" onclick="filterTasks('todas',this)">Todas</button>
        <button class="filter-btn" onclick="filterTasks('marketing',this)">Marketing</button>
        <button class="filter-btn" onclick="filterTasks('datos',this)">Datos</button>
        <button class="filter-btn" onclick="filterTasks('productividad',this)">Productividad</button>
      </div>
      <div id="tasks-list"></div>
    </div>
    <div class="panel" id="panel-analysis">
      <div id="analysis-input-area">
        <div id="analysis-type">
          <button class="atype-btn active" onclick="setAnalysisType('copy',this)">Copy / texto</button>
          <button class="atype-btn" onclick="setAnalysisType('campaña',this)">Campaña</button>
          <button class="atype-btn" onclick="setAnalysisType('métricas',this)">Métricas</button>
          <button class="atype-btn" onclick="setAnalysisType('competencia',this)">Competencia</button>
        </div>
        <textarea id="analysis-text" placeholder="Pegá acá el texto, datos o descripción que querés analizar..."></textarea>
        <button id="analyze-btn" onclick="runAnalysis()">Analizar con Pepe 🦗</button>
      </div>
      <div id="analysis-result">
        <div id="analysis-placeholder">Elegí un tipo de análisis, escribí tu contenido y presioná "Analizar". Pepe te da feedback concreto y accionable. 🦗</div>
      </div>
    </div>
  </div>
</div>
<script>
const SYSTEM_PROMPT=`Sos Pepe Grillo, el asistente personal de IA de Natuti. Tenés más de 15 años de experiencia en marketing, publicidad, estrategia de contenido, análisis de datos y productividad. Tu personalidad: creativa y energética, directa y sin relleno, analítica y crítica, cercana. Hablás de vos a vos con Natuti en español rioplatense. Usás emojis con criterio. Siempre la llamás Natuti. Tus respuestas son concretas, útiles y con energía.`;
let chatMessages=[],tasks=[],taskIdCounter=1,currentFilter='todas',analysisType='copy',isLoading=false;
const messagesEl=document.getElementById('messages');
const input=document.getElementById('msg-input');
const sendBtn=document.getElementById('send-btn');

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{['chat','tasks','analysis'].forEach((n,j)=>{if(i===j)t.classList.toggle('active',n===tab)})});
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
}

function addMessage(role,content){
  chatMessages.push({role,content});
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  const av=document.createElement('div');av.className='msg-avatar';av.textContent=role==='assistant'?'🦗':'👩';
  const bubble=document.createElement('div');bubble.className='bubble';bubble.textContent=content;
  div.appendChild(av);div.appendChild(bubble);
  messagesEl.appendChild(div);messagesEl.scrollTop=messagesEl.scrollHeight;
}

function showTyping(){
  const div=document.createElement('div');div.className='msg assistant';div.id='typing-indicator';
  const av=document.createElement('div');av.className='msg-avatar';av.textContent='🦗';
  const bubble=document.createElement('div');bubble.className='bubble typing';
  bubble.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.appendChild(av);div.appendChild(bubble);messagesEl.appendChild(div);messagesEl.scrollTop=messagesEl.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing-indicator');if(t)t.remove();}

async function sendMessage(text){
  if(!text.trim()||isLoading)return;
  isLoading=true;sendBtn.disabled=true;
  addMessage('user',text);showTyping();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages:chatMessages})});
    const data=await res.json();removeTyping();
    if(data.content&&data.content[0])addMessage('assistant',data.content[0].text);
    else addMessage('assistant','Ups, algo falló. Revisá la configuración.');
  }catch(e){removeTyping();addMessage('assistant','Error de conexión. Revisá que la app esté bien deployada.');}
  isLoading=false;sendBtn.disabled=false;
}

function getCategoryFromText(text){
  const t=text.toLowerCase();
  if(t.includes('marketing')||t.includes('contenido')||t.includes('campaña')||t.includes('post')||t.includes('copy'))return'marketing';
  if(t.includes('dato')||t.includes('métrica')||t.includes('reporte')||t.includes('análisis')||t.includes('kpi'))return'datos';
  if(t.includes('tarea')||t.includes('reunión')||t.includes('llamada')||t.includes('organiz')||t.includes('planif'))return'productividad';
  return'otro';
}

function addTask(){
  const inp=document.getElementById('task-input');const text=inp.value.trim();if(!text)return;
  tasks.push({id:taskIdCounter++,text,done:false,cat:getCategoryFromText(text)});
  inp.value='';renderTasks();
}
function toggleTask(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;renderTasks();}}
function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);renderTasks();}
function filterTasks(filter,btn){currentFilter=filter;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTasks();}
function renderTasks(){
  const list=document.getElementById('tasks-list');
  const filtered=currentFilter==='todas'?tasks:tasks.filter(t=>t.cat===currentFilter);
  if(!filtered.length){list.innerHTML='<div id="empty-tasks">No hay tareas todavía.<br>Agregá una arriba 👆</div>';return;}
  list.innerHTML='';
  filtered.slice().reverse().forEach(task=>{
    const div=document.createElement('div');div.className='task-item';
    div.innerHTML=`<div class="task-check ${task.done?'done':''}" onclick="toggleTask(${task.id})">${task.done?'✓':''}</div><div style="flex:1"><div class="task-text ${task.done?'done':''}">${task.text}</div><span class="task-cat cat-${task.cat}">${task.cat}</span></div><span class="task-del" onclick="deleteTask(${task.id})">×</span>`;
    list.appendChild(div);
  });
}

function setAnalysisType(type,btn){analysisType=type;document.querySelectorAll('.atype-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

async function runAnalysis(){
  const text=document.getElementById('analysis-text').value.trim();if(!text){alert('Escribí algo para analizar.');return;}
  const btn=document.getElementById('analyze-btn');const result=document.getElementById('analysis-result');
  btn.disabled=true;btn.textContent='Analizando...';result.textContent='';
  const prompts={
    'copy':`Analizá este copy desde perspectiva de marketing. Dame: 1) qué funciona bien, 2) qué mejorarías, 3) versión mejorada. Texto: "${text}"`,
    'campaña':`Analizá esta campaña. Dame: 1) puntos fuertes, 2) debilidades, 3) sugerencias concretas. Campaña: "${text}"`,
    'métricas':`Analizá estos datos. Dame: 1) qué dicen los números, 2) qué prestar atención, 3) próximos pasos. Datos: "${text}"`,
    'competencia':`Analizá esta info de competencia. Dame: 1) oportunidades, 2) amenazas, 3) acciones para Natuti. Info: "${text}"`
  };
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages:[{role:'user',content:prompts[analysisType]}]})});
    const data=await res.json();
    if(data.content&&data.content[0])result.textContent=data.content[0].text;
    else result.textContent='Error en el análisis.';
  }catch(e){result.textContent='Error de conexión.';}
  btn.disabled=false;btn.textContent='Analizar con Pepe 🦗';
}

input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,90)+'px';});
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();const text=input.value.trim();input.value='';input.style.height='auto';sendMessage(text);}});
sendBtn.addEventListener('click',()=>{const text=input.value.trim();input.value='';input.style.height='auto';sendMessage(text);});
document.getElementById('task-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
function sendChip(text){sendMessage(text);}

addMessage('assistant','¡Hola Natuti! 🦗✨ Soy Pepe Grillo, tu asistente completo. ¿Por dónde arrancamos hoy?');
renderTasks();
</script>
</body>
</html>
